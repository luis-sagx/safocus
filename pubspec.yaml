name: safocus
description: 'SaFocus — Anti-Procrastination App. Block distractions, limit apps, stay focused.'
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Local storage (SharedPreferences - no code gen needed)

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Charts
  fl_chart: ^0.68.0

  # Permissions
  permission_handler: ^11.3.1

  # Icons
  phosphor_flutter: ^2.1.0

  # Biometric auth
  local_auth: ^2.3.0

  # Secure storage for PIN hash
  flutter_secure_storage: ^9.2.4

  # Crypto (SHA-256 hashing)
  crypto: ^3.0.6

  # Background task scheduling
  workmanager: ^0.9.0

  # Shared preferences for simple settings
  shared_preferences: ^2.3.3

  # UUID
  uuid: ^4.5.1

  # Timezone (for scheduled notifications)
  timezone: ^0.10.0

  # Intl
  intl: ^0.20.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-Variable.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf

  assets:
    - assets/images/
    - assets/fonts/
    - lib/assets/

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
